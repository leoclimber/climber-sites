<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CONTATO — café A, Awwwards test</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#080503}
  body{font-family:'Fraunces',Georgia,serif}
  .filler{height:60vh;display:flex;align-items:center;justify-content:center;color:#4a4038;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:13px;letter-spacing:3px;text-transform:uppercase}
</style>
</head>
<body>

<div class="filler">↓ scroll to CONTACT ↓</div>

<!-- ============================================================
     CONTATO/LOCALIZAÇÃO — café A, última seção do site. Arquivo
     isolado de teste — NÃO usado pelo generate-site.js.

     DATA-DRIVEN: endereço, horário, telefone/email e redes sociais
     são todos variáveis no topo do <script> (CONTACT) — trocar de
     cafeteria é só editar esse objeto.

     MAPA: iframe real do Google Maps (embed sem API key, formato
     "/maps?q=ENDEREÇO&output=embed" — não precisa de chave). Como esse
     embed simples não aceita parâmetro de estilo noturno (isso só
     existe na Maps JavaScript API, que precisa de API key/billing),
     o "dark mode" é um filtro CSS no iframe (invert+hue-rotate — troca
     preto/branco de lugar e depois roda o matiz de volta pra ruas
     ficarem cinza/âmbar em vez de coloridas ao contrário). O CTA "Get
     directions" e o próprio mapa abrem o Google Maps de verdade.

     ENTRADA: ScrollTrigger.batch() nos blocos de texto + mapa, mesmo
     padrão já usado no teste-gallery.html (agrupa quem entra na
     viewport "ao mesmo tempo" num único stagger).
     ============================================================ -->
<section class="contact" id="contact" aria-label="Contact">
  <div class="contact__bg" aria-hidden="true"></div>
  <div class="contact__grain" aria-hidden="true"></div>

  <div class="contact__inner">
    <div class="contact__info">
      <div class="contact__eyebrow reveal">04 / VISIT US</div>
      <h2 class="contact__title reveal">Come say <em>hello.</em></h2>

      <div class="contact__block reveal">
        <div class="contact__label">Address</div>
        <p class="contact__text" id="cAddress"></p>
      </div>

      <div class="contact__block reveal">
        <div class="contact__label">Hours</div>
        <div class="contact__hours" id="cHours"></div>
      </div>

      <div class="contact__block reveal">
        <div class="contact__label">Contact</div>
        <p class="contact__text">
          <a class="contact__link" id="cPhone" href=""></a><br>
          <a class="contact__link" id="cEmail" href=""></a>
        </p>
      </div>

      <a class="contact__cta reveal" id="cCta" target="_blank" rel="noopener">Get directions</a>

      <div class="contact__socials reveal" id="cSocials"></div>
    </div>

    <div class="contact__map reveal">
      <iframe class="contact__mapFrame" id="cMapFrame" title="Map"
        loading="lazy" referrerpolicy="no-referrer-when-downgrade"
        allowfullscreen></iframe>
    </div>
  </div>
</section>

<div class="filler">↑ end of site ↑</div>

<style>
  .contact{position:relative;background:#080503;color:#F5EBDD;padding:12vh 6vw 10vh;overflow:hidden}
  .contact__bg{position:absolute;inset:0;z-index:0;background:
    radial-gradient(50% 40% at 15% 15%, rgba(210,140,60,.14) 0%, rgba(180,110,40,0) 68%),
    linear-gradient(180deg,#0c0805 0%,#080503 50%,#050302 100%)}
  .contact__grain{position:absolute;inset:0;z-index:1;pointer-events:none;opacity:.045;mix-blend-mode:overlay;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>")}

  .contact__inner{position:relative;z-index:2;max-width:1240px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:8vw;align-items:center}

  .contact__eyebrow{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;letter-spacing:3px;color:#E8B36B;text-transform:uppercase;margin-bottom:18px;opacity:.9}
  .contact__title{font-size:clamp(2.2rem,4.6vw,3.6rem);font-weight:600;line-height:1.05;letter-spacing:-.01em;color:#FFFBF4;margin-bottom:6vh}
  .contact__title em{font-style:italic;font-weight:500;color:#E8A64A}

  .contact__block{margin-bottom:3.4vh}
  .contact__label{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:10.5px;letter-spacing:2.5px;text-transform:uppercase;color:#8a7a63;margin-bottom:8px}
  .contact__text{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;line-height:1.7;color:#E8DCC8}
  .contact__hours{display:flex;flex-direction:column;gap:4px;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;color:#E8DCC8}
  .contact__hours div{display:flex;justify-content:space-between;max-width:280px}
  .contact__hours span:last-child{color:#CBB89A}

  .contact__link{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:14px;line-height:1.9;color:#E8DCC8;text-decoration:none;border-bottom:1px solid rgba(232,220,200,.25);transition:color .3s ease,border-color .3s ease}
  .contact__link:hover{color:#F2C879;border-color:rgba(242,200,121,.5)}

  .contact__cta{display:inline-block;margin-top:1vh;font-family:'JetBrains Mono',ui-monospace,monospace;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#0c0805;background:#F2C879;padding:15px 30px;border-radius:999px;text-decoration:none;box-shadow:0 10px 30px rgba(242,200,121,.2);transition:transform .35s cubic-bezier(.16,1,.3,1),box-shadow .35s ease}
  .contact__cta:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(242,200,121,.32)}

  .contact__socials{display:flex;gap:18px;margin-top:5vh}
  .contact__socials a{font-family:'JetBrains Mono',ui-monospace,monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#8a7a63;text-decoration:none;transition:color .3s ease}
  .contact__socials a:hover{color:#F2C879}

  /* mapa real (iframe Google Maps) com dark mode via filtro CSS —
     o embed sem API key não aceita "estilo noturno" nativo (isso só
     existe na Maps JS API paga), então invertemos as cores e giramos
     o matiz de volta: o branco do fundo vira quase preto, e o
     hue-rotate evita que tudo fique com cor trocada (azul virando
     laranja etc). brightness/contrast/saturate ajustam pra ficar
     discreto e combinar com a paleta do site. */
  .contact__map{position:relative;display:block;aspect-ratio:1/1;border-radius:22px;overflow:hidden;
    background:#100b07;border:1px solid rgba(255,255,255,.08);box-shadow:0 20px 50px rgba(0,0,0,.4)}
  .contact__mapFrame{position:absolute;inset:0;width:100%;height:100%;border:0;
    filter:invert(90%) hue-rotate(180deg) brightness(.95) contrast(.88) saturate(.7);
    background:#100b07}

  .reveal{opacity:0;transform:translateY(34px)}

  @media(max-width:900px){
    .contact__inner{grid-template-columns:1fr;gap:7vh}
    .contact__map{aspect-ratio:16/11;order:-1}
    .contact{padding:9vh 7vw 8vh}
  }

  @media(prefers-reduced-motion:reduce){
    .reveal{opacity:1;transform:none}
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.13.0/ScrollTrigger.min.js"></script>
<script>
(function(){
  // ============================================================
  // VARIÁVEIS — trocar aqui pra reusar em outra cafeteria.
  // ============================================================
  var CONTACT = {
    address: '42 Grafton Street, Dublin 2',
    hours: [
      {days:'Mon – Fri', time:'7:00 – 19:00'},
      {days:'Sat – Sun', time:'8:00 – 18:00'},
    ],
    phone: '+353 1 234 5678',
    email: 'hello@emberandoak.ie',
    socials: [
      {label:'Instagram', url:'https://instagram.com/'},
      {label:'Facebook',  url:'https://facebook.com/'},
    ],
  };

  document.getElementById('cAddress').textContent = CONTACT.address;

  var hoursEl = document.getElementById('cHours');
  CONTACT.hours.forEach(function(h){
    var row = document.createElement('div');
    row.innerHTML = '<span>'+h.days+'</span><span>'+h.time+'</span>';
    hoursEl.appendChild(row);
  });

  var phoneEl = document.getElementById('cPhone');
  phoneEl.textContent = CONTACT.phone;
  phoneEl.href = 'tel:'+CONTACT.phone.replace(/[^\d+]/g,'');

  var emailEl = document.getElementById('cEmail');
  emailEl.textContent = CONTACT.email;
  emailEl.href = 'mailto:'+CONTACT.email;

  var mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(CONTACT.address);
  document.getElementById('cCta').href = mapsUrl;

  // embed sem API key: /maps?q=ENDEREÇO&output=embed
  document.getElementById('cMapFrame').src = 'https://www.google.com/maps?q=' + encodeURIComponent(CONTACT.address) + '&output=embed';

  var socialsEl = document.getElementById('cSocials');
  CONTACT.socials.forEach(function(s, i){
    var a = document.createElement('a');
    a.href = s.url; a.target = '_blank'; a.rel = 'noopener';
    a.textContent = s.label;
    socialsEl.appendChild(a);
    if(i < CONTACT.socials.length-1){
      var dot = document.createElement('span');
      dot.textContent = '·'; dot.style.color = '#4a4038';
      socialsEl.appendChild(dot);
    }
  });

  // ============================================================
  // ENTRADA NO SCROLL
  // ============================================================
  var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var hasGsap = (typeof window.gsap!=='undefined' && typeof window.ScrollTrigger!=='undefined');

  if(reduce || !hasGsap){
    document.querySelectorAll('.reveal').forEach(function(el){ el.style.opacity=1; el.style.transform='none'; });
    return;
  }

  gsap.registerPlugin(ScrollTrigger);

  ScrollTrigger.batch('.reveal', {
    start:'top 88%',
    onEnter: function(batch){
      gsap.to(batch, {opacity:1, y:0, duration:1, ease:'power3.out', stagger:.1});
    },
    once:true,
  });

  window.__contactReady = true; // hook diagnóstico
})();
</script>

</body>
</html>
